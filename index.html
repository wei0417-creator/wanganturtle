<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠蠵龜保育內部平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 控制頁面顯示/隱藏的簡單 CSS */
        .page { display: none; }
        .page.active { display: block; }
        /* 載入動畫 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #059669;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loginPage" class="page active">
        <div class="bg-emerald-900 flex items-center justify-center min-h-screen p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm transition-all transform hover:scale-105">
                <div class="text-center mb-8">
                    <span class="text-6xl">🐢</span>
                    <h1 class="text-3xl font-bold text-emerald-800 mt-3">志工內部平台</h1>
                    <p class="text-gray-500 text-sm mt-1">請輸入電子郵件開始巡守</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">志工電子郵件</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 transition">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-semibold text-lg shadow-md hover:bg-emerald-700 active:bg-emerald-800 transition">進入系統</button>
                </div>
            </div>
        </div>
    </div>

    <div id="formPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🐢</span>
                <span class="font-bold text-lg">新增巡守日誌</span>
            </div>
            <button onclick="loadHistory()" class="text-sm bg-emerald-800 px-4 py-2 rounded-lg hover:bg-emerald-900 transition">歷史紀錄</button>
        </nav>

        <div class="max-w-lg mx-auto mt-6 px-4 pb-16">
            <form id="logForm" class="bg-white rounded-2xl shadow-sm p-6 space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">巡守地區</label>
                    <select id="area" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                        <option>水庫保育區</option>
                        <option>天台山保育區</option>
                        <option>土地公港保育區</option>
                        <option>萬善宮保育區</option>
                        <option>網胺口保育區</option>
                        <option>天后宮保育區</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">發現海龜種類</label>
                    <select id="turtleType" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                        <option value="無">未發現海龜</option>
                        <option>綠蠵龜 (Green Turtle)</option>
                        <option>赤蠵龜 (Loggerhead)</option>
                        <option>欖蠵龜 (Olive Ridley)</option>
                        <option>革龜 (Leatherback)</option>
                        <option>玳瑁 (Hawksbill)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">數量 (隻)</label>
                    <input type="number" id="count" value="0" min="0" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">巡守心得 / 現場狀況</label>
                    <textarea id="note" rows="5" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="例如：發現爬痕、沙灘狀況、協助清理漂流木..."></textarea>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-dashed text-center">
                    <p class="text-xs text-gray-500">註：照片儲存功能開發中。如有需要，請將照片連結貼在心得中，或上傳至 Line 群組。</p>
                </div>

                <button type="button" id="submitBtn" onclick="submitLog()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-emerald-700 active:bg-emerald-800 transition flex items-center justify-center gap-2">
                    <span id="btnText">提交日誌到試算表</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <div id="historyPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <button onclick="showPage('formPage')" class="text-sm bg-emerald-800 px-4 py-2 rounded-lg hover:bg-emerald-900 transition">← 返回填寫</button>
            <span class="font-bold text-lg">歷史紀錄回顧</span>
            <button onclick="handleLogout()" class="text-xs opacity-80 hover:opacity-100">登出</button>
        </nav>

        <div class="max-w-lg mx-auto mt-6 px-4 pb-16">
            <div class="bg-orange-50 text-orange-800 p-4 rounded-xl mb-4 text-sm border border-orange-200 shadow-sm">
                💡 管理員請在 Google 試算表的 <b>H 欄 (review)</b> 輸入回饋，網頁會即時更新。
            </div>
            
            <div id="historyList" class="space-y-5">
                </div>
        </div>
    </div>

    <script>
        // --- [ 1. 設定區 ] ---
        // ⚠️ 請將下方引號內文字換成您從 Google Apps Script 取得的「網頁應用程式 URL」
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwMpLHeI1CWuVe2ZVp-grqC1L8dMd9-C4CmRNGKP2a9ntg4kw5AcXo3tZdW8-Ps33JmHA/exec"; 


        // --- [ 2. 初始化與頁面控制 ] ---
        // 網頁載入時執行
        window.onload = function() {
            // 檢查是否已經登入
            const user = localStorage.getItem('volunteer_user');
            if (user) {
                showPage('formPage');
            }
        }

        // 切換頁面函式
        function showPage(pageId) {
            // 隱藏所有頁面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 顯示目標頁面
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
            window.scrollTo(0, 0); // 回到頂端
        }

        // --- [ 3. 登入/登出邏輯 ] ---
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            // 簡易檢查：有包含 @ 符號即可
            if(email && email.includes('@')) {
                // 將使用者帳號存入瀏覽器 (Local Storage)
                localStorage.setItem('volunteer_user', email);
                showPage('formPage');
            } else {
                alert("请输入正確的電子郵件格式。");
            }
        }

        function handleLogout() {
            // 清除使用者資料並回到登入頁
            localStorage.removeItem('volunteer_user');
            document.getElementById('loginEmail').value = '';
            showPage('loginPage');
        }

        // --- [ 4. 提交日誌 (POST 方法) ] ---
        async function submitLog() {
            const user = localStorage.getItem('volunteer_user');
            const area = document.getElementById('area').value;
            const note = document.getElementById('note').value;
            
            // 簡單驗證
            if(!note) { alert("請填寫心得備註！"); return; }

            // UI 狀態更新（顯示上傳中）
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            btn.disabled = true;
            btnText.innerText = "傳送中...";
            btnLoader.classList.remove('hidden');

            // 準備要傳送的資料 (JSON 格式)
            const payload = {
                user: user,
                area: area,
                turtleType: document.getElementById('turtleType').value,
                count: document.getElementById('count').value,
                note: note,
                photoUrl: "(文字) " + note.substring(0, 20) + "..." // 暫時預留照片欄位
            };

            try {
                // 使用 fetch API 將資料 POST 到 Google Sheets
                // 註：因為 GAS 的特性，這裡需要設定 mode: 'no-cors'，雖然會導致無法讀取 Success 回應，但資料能成功送出。
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                // 因為 no-cors 無法判斷是否成功，我們預設只要沒拋出錯誤就是成功
                alert("日誌已成功存入試算表！\n請至「歷史紀錄」查看。");
                document.getElementById('logForm').reset();
                document.getElementById('count').value = 0; // 重設數量為0
                
            } catch (err) {
                console.error("提交錯誤:", err);
                alert("連線失敗，請檢查網路狀況。");
            }

            // 恢復 UI 狀態
            btn.disabled = false;
            btnText.innerText = "提交日誌到試算表";
            btnLoader.classList.add('hidden');
        }

        // --- [ 5. 抓取歷史紀錄 (GET 方法) ] ---
        async function loadHistory() {
            showPage('historyPage');
            const list = document.getElementById('historyList');
            // 顯示讀取中狀態
            list.innerHTML = `
                <div class="text-center py-10 text-emerald-700">
                    <div class="loader mb-2"></div>
                    <p>正在從試算表讀取最新資料...</p>
                </div>
            `;

            try {
                // 抓取 Google Sheets 資料 (GET 方法)
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                // 清空列表
                list.innerHTML = "";

                if (data.length === 0) {
                    list.innerHTML = `<div class="text-center text-gray-500 py-10">目前尚無巡守紀錄。</div>`;
                    return;
                }

                // 動態生成 HTML 卡片
                data.forEach(item => {
                    // 格式化時間 (將 GAS 傳來的 ISO 時間轉為在地格式)
                    const date = new Date(item.timestamp).toLocaleString('zh-TW', { 
                        year: 'numeric', month: '2-digit', day: '2-digit', 
                        hour: '2-digit', minute: '2-digit' 
                    });

                    // 卡片 HTML 結構
                    list.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border-l-4 border-emerald-500 transform transition hover:shadow-md">
                            <div class="p-4 border-b bg-emerald-50 flex justify-between items-center text-xs">
                                <span class="font-bold text-emerald-900">${date}</span>
                                <span class="bg-emerald-200 text-emerald-800 px-3 py-1 rounded-full font-semibold">${item.area}</span>
                            </div>
                            <div class="p-5">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="text-3xl">🐢</span>
                                    <div>
                                        <p class="text-sm text-gray-500">發現種類與數量</p>
                                        <p class="font-bold text-base text-black">${item.turtleType} (<span class="text-emerald-700">${item.count}隻</span>)</p>
                                    </div>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <p class="text-xs text
