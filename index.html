<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠蠵龜保育志工平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="loginPage" class="page active">
        <div class="bg-emerald-900 flex items-center justify-center min-h-screen p-6">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                <div class="text-6xl mb-4">🐢</div>
                <h1 class="text-2xl font-bold text-emerald-800">望安巡守平台</h1>
                <p class="text-gray-400 text-sm mb-8">Volunteer Internal System</p>
                <input type="email" id="loginEmail" placeholder="請輸入志工信箱" class="w-full px-4 py-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-emerald-500">
                <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition">進入系統</button>
            </div>
        </div>
    </div>

    <div id="formPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <span class="font-bold flex items-center gap-2">📝 新增日誌</span>
            <button onclick="loadHistory()" class="text-xs bg-emerald-800 px-3 py-2 rounded-lg">查看紀錄</button>
        </nav>
        <div class="max-w-lg mx-auto p-4 pb-20">
            <form id="logForm" class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">巡守地區</label>
                    <select id="area" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                        <option>水庫保育區</option><option>天台山保育區</option><option>土地公港保育區</option>
                        <option>萬善宮保育區</option><option>網胺口保育區</option><option>天后宮保育區</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">發現種類</label>
                    <select id="turtleType" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                        <option>未發現</option><option>綠蠵龜</option><option>赤蠵龜</option>
                        <option>欖蠵龜</option><option>革龜</option><option>玳瑁</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">數量 (隻)</label>
                    <input type="number" id="count" value="0" min="0" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">巡守心得</label>
                    <textarea id="note" rows="4" class="w-full p-3 border rounded-xl bg-gray-50 outline-none" placeholder="描述今日巡守狀況..."></textarea>
                </div>
                <button type="button" id="submitBtn" onclick="submitLog()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg flex justify-center items-center gap-2">
                    <span id="btnText">確認提交</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <div id="historyPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <button onclick="showPage('formPage')" class="text-sm bg-emerald-800 px-3 py-1.5 rounded-lg">← 返回</button>
            <span class="font-bold">歷史巡守紀錄</span>
            <button onclick="handleLogout()" class="text-xs opacity-60">登出</button>
        </nav>
        <div class="max-w-lg mx-auto p-4 space-y-4" id="historyList">
            </div>
    </div>

    <script>
        // ======= [ 設定區 ] =======
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTTORZubY92dYyGv27sPcnieArHtyxQmdHB2oGPUNayUa15w3p-orJOY4VxqST9AYmCQ/exec"; 

        // ======= [ 功能邏輯 ] =======
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            if(email && email.includes('@')) {
                localStorage.setItem('monitor_user', email);
                showPage('formPage');
            } else {
                alert("請輸入正確的電子郵件");
            }
        }

        function handleLogout() {
            localStorage.removeItem('monitor_user');
            location.reload();
        }

        async function submitLog() {
            const note = document.getElementById('note').value;
            if(!note) return alert("請填寫心得！");

            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('btnLoader');
            btn.disabled = true;
            loader.classList.remove('hidden');

            const payload = {
                user: localStorage.getItem('monitor_user'),
                area: document.getElementById('area').value,
                turtleType: document.getElementById('turtleType').value,
                count: document.getElementById('count').value,
                note: note
            };

            try {
                // 使用 POST 提交
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                alert("提交成功！資料已同步至試算表。");
                document.getElementById('logForm').reset();
                loadHistory(); // 成功後直接跳轉紀錄頁
            } catch (err) {
                alert("連線失敗，請確認 GAS URL 是否正確。");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        async function loadHistory() {
            showPage('historyPage');
            const list = document.getElementById('historyList');
            list.innerHTML = `<div class="text-center py-10 text-emerald-600">讀取資料中...</div>`;

            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                list.innerHTML = "";

                if(data.length === 0) list.innerHTML = `<div class="text-center py-10 text-gray-400">尚無紀錄</div>`;

                data.forEach(item => {
                    const date = new Date(item.timestamp).toLocaleString();
                    list.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border-l-4 border-emerald-500 overflow-hidden">
                            <div class="p-3 bg-emerald-50 flex justify-between text-[10px] font-bold text-emerald-800">
                                <span>${date}</span><span>${item.area}</span>
                            </div>
                            <div class="p-4 text-sm">
                                <p class="font-bold text-emerald-900 mb-1">${item.turtleType} (${item.count}隻)</p>
                                <p class="text-gray-600 leading-relaxed">${item.note}</p>
                            </div>
                            <div class="p-3 bg-orange-50 border-t border-orange-100">
                                <p class="text-[10px] font-bold text-orange-600 mb-1">📢 評核回饋：</p>
                                <p class="text-sm text-gray-700 italic">${item.review || '管理員審核中...'}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-xl">載入失敗，請確認 GAS 權限設定。</div>`;
            }
        }

        window.onload = () => {
            if(localStorage.getItem('monitor_user')) showPage('formPage');
        };
    </script>
</body>
</html>
