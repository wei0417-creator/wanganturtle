<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠蠵龜保育內部平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="loginPage" class="page active">
        <div class="bg-emerald-900 flex items-center justify-center min-h-screen p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                <span class="text-6xl">🐢</span>
                <h1 class="text-2xl font-bold text-emerald-800 mt-4">望安綠蠵龜保育平台</h1>
                <p class="text-gray-500 text-sm mb-8">志工內部作業系統</p>
                <div class="space-y-4 text-left">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">志工信箱</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg">進入系統</button>
                </div>
            </div>
        </div>
    </div>

    <div id="formPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <span class="font-bold">📝 新增巡守日誌</span>
            <button onclick="loadHistory()" class="text-sm bg-emerald-800 px-3 py-1.5 rounded-lg">歷史紀錄</button>
        </nav>

        <div class="max-w-lg mx-auto mt-6 px-4 pb-20">
            <form id="logForm" class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">巡守地區</label>
                    <select id="area" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500">
                        <option>水庫保育區</option>
                        <option>天台山保育區</option>
                        <option>土地公港保育區</option>
                        <option>萬善宮保育區</option>
                        <option>網胺口保育區</option>
                        <option>天后宮保育區</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">發現海龜種類</label>
                    <select id="turtleType" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500">
                        <option>未發現</option>
                        <option>綠蠵龜</option>
                        <option>赤蠵龜</option>
                        <option>欖蠵龜</option>
                        <option>革龜</option>
                        <option>玳瑁</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">數量 (隻)</label>
                    <input type="number" id="count" value="0" min="0" class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">巡守心得</label>
                    <textarea id="note" rows="4" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-emerald-500" placeholder="記錄今日巡守狀況..."></textarea>
                </div>

                <div class="bg-amber-50 p-3 rounded-lg border border-amber-200 text-xs text-amber-700">
                    💡 照片請先傳至群組，並將連結貼在心得中。
                </div>

                <button type="button" id="submitBtn" onclick="submitLog()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-emerald-700 flex justify-center items-center gap-2">
                    <span id="btnText">提交日誌</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <div id="historyPage" class="page">
        <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
            <button onclick="showPage('formPage')" class="text-sm bg-emerald-800 px-3 py-1.5 rounded-lg">← 返回</button>
            <span class="font-bold">歷史紀錄</span>
            <button onclick="handleLogout()" class="text-xs opacity-70">登出</button>
        </nav>

        <div class="max-w-lg mx-auto mt-6 px-4 pb-20">
            <div id="historyList" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // --- [ 1. 設定區 ] ---
        // ⚠️ 請務必在此貼上您的 Google Script 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTTORZubY92dYyGv27sPcnieArHtyxQmdHB2oGPUNayUa15w3p-orJOY4VxqST9AYmCQ/exec"; 

        // --- [ 2. 登入與頁面切換 ] ---
        function showPage(pageId) {
            console.log("切換頁面到: " + pageId);
            const allPages = document.querySelectorAll('.page');
            allPages.forEach(p => p.classList.remove('active'));
            
            const target = document.getElementById(pageId);
            if(target) {
                target.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            if(email && email.includes('@')) {
                localStorage.setItem('turtle_user', email);
                showPage('formPage');
            } else {
                alert("請輸入有效的電子郵件地址。");
            }
        }

        function handleLogout() {
            localStorage.removeItem('turtle_user');
            location.reload(); // 重新整理網頁回到初始狀態
        }

        // --- [ 3. 提交日誌 (POST) ] ---
        async function submitLog() {
            const note = document.getElementById('note').value;
            if(!note) { alert("請填寫心得內容！"); return; }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            btn.disabled = true;
            btnText.innerText = "正在傳送...";
            btnLoader.classList.remove('hidden');

            const payload = {
                user: localStorage.getItem('turtle_user'),
                area: document.getElementById('area').value,
                turtleType: document.getElementById('turtleType').value,
                count: document.getElementById('count').value,
                note: note
            };

            try {
                // 使用 no-cors 模式發送 POST
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                alert("日誌已成功存入試算表！");
                document.getElementById('logForm').reset();
                document.getElementById('count').value = 0;
            } catch (err) {
                console.error(err);
                alert("連線發生錯誤，請檢查網路或網址。");
            }

            btn.disabled = false;
            btnText.innerText = "提交日誌";
            btnLoader.classList.add('hidden');
        }

        // --- [ 4. 讀取紀錄 (GET) ] ---
        async function loadHistory() {
            showPage('historyPage');
            const list = document.getElementById('historyList');
            list.innerHTML = `<div class="text-center py-10 text-emerald-600">讀取中...</div>`;

            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                list.innerHTML = "";

                if(data.length === 0) {
                    list.innerHTML = `<div class="text-center py-10 text-gray-400">尚無紀錄。</div>`;
                    return;
                }

                data.forEach(item => {
                    const date = new Date(item.timestamp).toLocaleString('zh-TW');
                    list.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border-l-4 border-emerald-500 overflow-hidden">
                            <div class="p-3 bg-emerald-50 flex justify-between text-xs font-bold text-emerald-800">
                                <span>${date}</span>
                                <span>${item.area}</span>
                            </div>
                            <div class="p-4 text-sm">
                                <p class="mb-1 font-bold">${item.turtleType} (${item.count}隻)</p>
                                <p class="text-gray-600">${item.note}</p>
                            </div>
                            <div class="p-3 bg-orange-50 border-t border-orange-100">
                                <p class="text-xs font-bold text-orange-600">📢 評核回饋：</p>
                                <p class="text-sm text-gray-700 italic">${item.review || '管理員審核中...'}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = `<div class="p-4 text-red-500 bg-white rounded-lg">無法讀取資料，請確認 GAS URL 是否正確。</div>`;
            }
        }

        // 初始檢查
        window.onload = function() {
            if(localStorage.getItem('turtle_user')) {
                showPage('formPage');
            }
        };
    </script>
</body>
</html>
